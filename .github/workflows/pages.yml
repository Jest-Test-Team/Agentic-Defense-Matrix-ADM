name: Deploy Dashboard (GitHub Pages)

# Builds the Next.js dashboard as a static site and publishes it to GitHub Pages.
# Enable once in the repo: Settings → Pages → Build and deployment → Source:
# "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      # Run first so its base_path output (the real Pages sub-path, which may
      # differ from the raw repo name) can be baked into the static build.
      - uses: actions/configure-pages@v5
        id: pages
        with:
          enablement: true

      - run: npm ci

      - name: Build static export
        env:
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Add .nojekyll (serve _next assets)
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
